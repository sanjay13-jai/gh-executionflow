name: Matrix Demo 
on: push
jobs:
  build:
    strategy:
      matrix:
        node-version: [20, 22, 24]
        operation-system: [ubuntu-latest, windows-latest]
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install node.JS
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: num run build        